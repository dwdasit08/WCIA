    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700;900&family=Roboto:wght@300;400;500;700;900&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
    <!-- TOP BAR -->
    <div class="top-bar">...</div>
    <!-- HEADER -->
    <header class="main-header" id="mainHeader">
        ...
        <nav>
            <ul>
                ...
                <li>
                    <a href="get-involved.html" class="active">Get Involved <i class="fas fa-chevron-down"></i></a>
                    <ul class="dropdown">
                        <li><a href="registration.html">Registration</a></li>
                        <li><a href="pay-online.html" class="active">Pay Online</a></li>
                        <li><a href="registration-details.html">Registration Details</a></li>
                        <li><a href="membership-renewal.html">Membership Renewal</a></li>
                    </ul>
                </li>
                ...
            </ul>
        </nav>
    </header>
    <!-- HERO -->
    <section class="hero" style="min-height:50vh;">
        <div class="overlay"></div>
        <div class="hero-content">
            <div class="badge"><i class="fas fa-credit-card"></i> Secure Payment</div>
            <h1>Pay <span style="color:var(--gold);">Online</span></h1>
            <p>Make payments for registration, membership, donations, and other services.</p>
        </div>
    </section>
    <!-- Payment Form -->
    <section class="section-padding" style="background:var(--primary);">
        <div class="container">
            <div style="max-width:500px;margin:0 auto;background:rgba(255,255,255,0.04);padding:40px;border-radius:var(--radius);border:1px solid rgba(255,255,255,0.06);">
                <h2 style="color:var(--gold);text-align:center;margin-bottom:24px;">Payment Details</h2>
                <form>
                    <div style="margin-bottom:16px;">
                        <label style="display:block;color:var(--text-light);font-weight:600;margin-bottom:6px;">Full Name *</label>
                        <input type="text" name="name" required style="width:100%;padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#fff;font-size:1rem;" />
                    </div>
                    <div style="margin-bottom:16px;">
                        <label style="display:block;color:var(--text-light);font-weight:600;margin-bottom:6px;">Email *</label>
                        <input type="email" name="email" required style="width:100%;padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#fff;font-size:1rem;" />
                    </div>
                    <div style="margin-bottom:16px;">
                        <label style="display:block;color:var(--text-light);font-weight:600;margin-bottom:6px;">Amount (₹) *</label>
                        <input type="number" name="amount" required min="1" style="width:100%;padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#fff;font-size:1rem;" />
                    </div>
                    <div style="margin-bottom:16px;">
                        <label style="display:block;color:var(--text-light);font-weight:600;margin-bottom:6px;">Payment Method</label>
                        <select name="method" style="width:100%;padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#fff;font-size:1rem;">
                            <option>UPI</option>
                            <option>Credit Card</option>
                            <option>Debit Card</option>
                            <option>Net Banking</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-gold" style="width:100%;">Pay Now</button>
                </form>
                <p style="color:var(--text-muted);font-size:0.85rem;margin-top:16px;text-align:center;">All transactions are secure and encrypted.</p>
            </div>
        </div>
    </section>
    <!-- FOOTER -->
    <footer class="main-footer">...</footer>
    <script src="js/main.js"></script>
</body>
</html>
