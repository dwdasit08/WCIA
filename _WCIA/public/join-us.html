<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join Us – WCIA</title>
    <meta name="description" content="Join WCIA as a player, volunteer, or supporter." />
    <link rel="icon" href="https://wcia.tv/wp-content/uploads/2026/03/cropped-imresizer-WCIA-logo-1-1-32x32.png" />
    <link rel="apple-touch-icon" href="https://wcia.tv/wp-content/uploads/2026/03/cropped-imresizer-WCIA-logo-1-1-180x180.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700;900&family=Roboto:wght@300;400;500;700;900&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
    <!-- TOP BAR -->
    <div class="top-bar">...</div>
    <!-- HEADER -->
    <header class="main-header" id="mainHeader">
        ...
        <!-- no active -->
    </header>
    <!-- HERO -->
    <section class="hero" style="min-height:50vh;">
        <div class="overlay"></div>
        <div class="hero-content">
            <div class="badge"><i class="fas fa-handshake"></i> Become a Part</div>
            <h1>Join <span style="color:var(--gold);">Us</span></h1>
            <p>Whether you're a player, coach, volunteer, or supporter – we welcome you to the WCIA family.</p>
        </div>
    </section>
    <!-- Join Form -->
    <section class="section-padding" style="background:var(--primary);">
        <div class="container">
            <div style="max-width:600px;margin:0 auto;background:rgba(255,255,255,0.04);padding:40px;border-radius:var(--radius);border:1px solid rgba(255,255,255,0.06);">
                <h2 style="color:var(--gold);text-align:center;margin-bottom:24px;">Join WCIA</h2>
                <form>
                    <div style="margin-bottom:16px;">
                        <label style="display:block;color:var(--text-light);font-weight:600;margin-bottom:6px;">Full Name *</label>
                        <input type="text" name="name" required style="width:100%;padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#fff;font-size:1rem;" />
                    </div>
                    <div style="margin-bottom:16px;">
                        <label style="display:block;color:var(--text-light);font-weight:600;margin-bottom:6px;">Email *</label>
                        <input type="email" name="email" required style="width:100%;padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#fff;font-size:1rem;" />
                    </div>
                    <div style="margin-bottom:16px;">
                        <label style="display:block;color:var(--text-light);font-weight:600;margin-bottom:6px;">Phone *</label>
                        <input type="tel" name="phone" required style="width:100%;padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#fff;font-size:1rem;" />
                    </div>
                    <div style="margin-bottom:16px;">
                        <label style="display:block;color:var(--text-light);font-weight:600;margin-bottom:6px;">I want to join as:</label>
                        <select name="role" style="width:100%;padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#fff;font-size:1rem;">
                            <option>Player</option>
                            <option>Volunteer</option>
                            <option>Coach</option>
                            <option>Supporter / Donor</option>
                            <option>Other</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%;">Submit</button>
                </form>
                <p style="color:var(--text-muted);font-size:0.85rem;margin-top:16px;text-align:center;">We will contact you shortly with next steps.</p>
            </div>
        </div>
    </section>
    <!-- FOOTER -->
    <footer class="main-footer">...</footer>
    <script src="js/main.js"></script>
</body>
</html>
